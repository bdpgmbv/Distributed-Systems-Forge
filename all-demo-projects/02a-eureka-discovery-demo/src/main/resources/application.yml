server.port: 8761
spring.application.name: eureka-server
eureka:
  client: { register-with-eureka: false, fetch-registry: false }
  server: { enable-self-preservation: false, eviction-interval-timer-in-ms: 2000 }
logging.level.com.demo: DEBUG
---
spring:
  config.activate.on-profile: user
  application.name: user-service
server.port: 8081
eureka:
  client: { register-with-eureka: true, fetch-registry: true, service-url.defaultZone: "http://localhost:8761/eureka/" }
  instance: { prefer-ip-address: true, lease-renewal-interval-in-seconds: 5, lease-expiration-duration-in-seconds: 15 }
---
spring:
  config.activate.on-profile: order
  application.name: order-service
server.port: 8082
eureka:
  client: { register-with-eureka: true, fetch-registry: true, service-url.defaultZone: "http://localhost:8761/eureka/" }
  instance: { prefer-ip-address: true }
