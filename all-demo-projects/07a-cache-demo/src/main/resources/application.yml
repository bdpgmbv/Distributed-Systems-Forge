server.port: 8080
spring:
  application.name: cache-demo
  cache.type: caffeine
  cache.caffeine.spec: maximumSize=100,expireAfterWrite=60s
  datasource: { url: "jdbc:h2:mem:cache", driver-class-name: org.h2.Driver }
  jpa: { hibernate.ddl-auto: create }
  h2.console: { enabled: true, path: /h2 }
logging.level.com.demo: DEBUG
