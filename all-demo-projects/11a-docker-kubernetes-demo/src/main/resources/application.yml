server:
  port: 8080
  shutdown: graceful
spring:
  application.name: k8s-demo
  lifecycle.timeout-per-shutdown-phase: 30s
management:
  endpoints.web.exposure.include: health,info,prometheus
  endpoint.health: { show-details: always, probes.enabled: true }
  health: { livenessstate.enabled: true, readinessstate.enabled: true }
logging.level.com.demo: DEBUG