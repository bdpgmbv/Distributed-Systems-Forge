server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route /api/users/** → user-service on :8081
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - AddRequestHeader=X-Gateway, true
            - AddResponseHeader=X-Response-Time, processed
            - name: Retry
              args:
                retries: 3
                methods: GET

        # Route /api/orders/** → order-service on :8082
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**

management:
  endpoints.web.exposure.include: health,gateway
logging:
  level:
    com.demo: DEBUG
    org.springframework.cloud.gateway: DEBUG
