server.port: 8080
spring.application.name: chaos-demo
chaos:
  enabled: true
  latency: { enabled: true, min-ms: 500, max-ms: 3000 }
  exception: { enabled: true, rate: 30 }
resilience4j.circuitbreaker.instances.backend:
  sliding-window-size: 10
  failure-rate-threshold: 50
  wait-duration-in-open-state: 10s
logging.level.com.demo: DEBUG